<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — User Management Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <!-- ──── Top Bar ──── -->
    <div class="topbar">
        <div class="logo">User<span>Portal</span></div>
        <div class="topbar-actions">
            <span class="topbar-user" id="topbarName">Welcome</span>
            <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- ──── Dashboard ──── -->
    <div class="dashboard">
        <div id="alertBox" class="alert"></div>

        <!-- Profile View -->
        <div id="profileView" class="profile-card">
            <h2>👤 My Profile</h2>
            <div class="profile-info">
                <div class="info-row">
                    <span class="info-label">Name</span>
                    <span class="info-value" id="userName">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="userEmail">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="userPhone">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Address</span>
                    <span class="info-value" id="userAddress">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Joined</span>
                    <span class="info-value" id="userJoined">—</span>
                </div>
            </div>
            <button class="btn btn-primary" id="editBtn">✏️ Edit Profile</button>
        </div>

        <!-- Profile Edit Form (hidden by default) -->
        <div id="profileEdit" class="profile-card" style="display: none;">
            <h2>✏️ Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="editName">Name</label>
                    <input type="text" id="editName" placeholder="Your full name" required />
                </div>
                <div class="form-group">
                    <label for="editPhone">Phone</label>
                    <input type="text" id="editPhone" placeholder="+1234567890" />
                </div>
                <div class="form-group">
                    <label for="editAddress">Address</label>
                    <textarea id="editAddress" placeholder="Your address"></textarea>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="submit" id="saveBtn" class="btn btn-primary">💾 Save Changes</button>
                    <button type="button" id="cancelBtn" class="btn btn-outline">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/user.js"></script>
</body>
</html>
